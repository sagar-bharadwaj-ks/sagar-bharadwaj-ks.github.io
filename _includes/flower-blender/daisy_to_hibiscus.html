<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = {
        prefix: 'tw-',
        corePlugins: {
            preflight: false,
        }
    }
</script>

<div id="scrubber-widget-container"
    class="tw-my-8 tw-flex tw-flex-col tw-w-full tw-max-w-3xl tw-mx-auto tw-font-sans tw-antialiased">
    <div class="tw-relative tw-mx-auto tw-w-fit tw-max-w-full tw-overflow-hidden tw-rounded-lg tw-flex tw-justify-center"
        id="video-wrapper" style="max-height: 500px;">
        <video id="jekyll-video" class="tw-block tw-max-w-full tw-cursor-pointer"
            style="max-height: 500px; height: auto; width: auto;" src="/images/flower_blender/Dolly_Daisy_Hib.mp4"
            playsinline muted preload="auto"></video>

        <div class="tw-absolute tw-inset-0 tw-pointer-events-none tw-shadow-[inset_0_0_40px_rgba(0,0,0,0.3)]"></div>
    </div>

    <div class="tw-flex tw-items-center tw-gap-4 tw-mt-4 tw-w-full tw-px-1">
        <button id="play-btn"
            class="tw-flex-shrink-0 tw-w-10 tw-h-10 tw-flex tw-items-center tw-justify-center tw-bg-blue-600 hover:tw-bg-blue-500 tw-text-white tw-rounded-full tw-transition-all tw-shadow-md active:tw-scale-95 tw-border-none tw-cursor-pointer">
            <svg id="play-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5"
                fill="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg id="pause-icon" class="tw-hidden" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor"
                stroke-width="2.5" fill="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
        </button>

        <div id="progress-container"
            class="tw-relative tw-flex-grow tw-h-8 tw-flex tw-items-center tw-cursor-pointer tw-group"
            style="touch-action: none;">
            <div class="tw-h-1.5 tw-w-full tw-bg-gray-200 dark:tw-bg-neutral-800 tw-rounded-full tw-overflow-hidden">
                <div id="progress-fill" class="tw-h-full tw-bg-blue-500 tw-rounded-full" style="width: 0%"></div>
            </div>
            <div id="progress-handle"
                class="tw-absolute tw-top-1/2 tw--translate-y-1/2 tw-w-4 tw-h-4 tw-bg-white tw-rounded-full tw-shadow-lg tw-border-2 tw-border-solid tw-border-blue-600"
                style="left: 0%"></div>
        </div>
    </div>

    <div id="scrubber-error" class="tw-text-red-500 tw-text-xs tw-mt-2 tw-hidden">Video failed to load. Check file path.
    </div>
</div>

<script>
        (function () {
            const video = document.getElementById('jekyll-video');
            const container = document.getElementById('progress-container');
            const fill = document.getElementById('progress-fill');
            const handle = document.getElementById('progress-handle');
            const playBtn = document.getElementById('play-btn');
            const playIcon = document.getElementById('play-icon');
            const pauseIcon = document.getElementById('pause-icon');
            const errorMsg = document.getElementById('scrubber-error');

            let isScrubbing = false;
            let isReversing = false;
            let reverseInterval;

            const updateUI = () => {
                if (!video.duration || isNaN(video.duration)) return;
                const percent = (video.currentTime / video.duration) * 100;
                fill.style.width = percent + '%';
                handle.style.left = `calc(${percent}% - 8px)`;
            };

            const scrub = (e) => {
                const rect = container.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const x = Math.max(0, Math.min(clientX - rect.left, rect.width));
                const percent = x / rect.width;

                if (video.duration && !isNaN(video.duration)) {
                    video.currentTime = percent * video.duration;
                    updateUI();
                }
            };

            const startScrubbing = (e) => {
                isScrubbing = true;
                stopPlayback(); // Stop both forward and backward playback
                scrub(e);
                if (e.cancelable) e.preventDefault();
            };

            const stopScrubbing = () => { isScrubbing = false; };

            const startReversePlayback = () => {
                isReversing = true;
                video.pause(); // Pause standard forward playback

                // 30fps approximate refresh for smooth reverse
                reverseInterval = setInterval(() => {
                    if (video.currentTime <= 0.05) { // Threshold near zero
                        clearInterval(reverseInterval);
                        isReversing = false;
                        video.play(); // Flip back to forward
                    } else {
                        video.currentTime -= 0.033; // Approx 1 frame at 30fps
                        updateUI();
                    }
                }, 33);
            };

            const stopPlayback = () => {
                video.pause();
                clearInterval(reverseInterval);
                isReversing = false;
            };

            playBtn.onclick = (e) => {
                e.stopPropagation();
                if (video.paused && !isReversing) {
                    video.play();
                } else {
                    stopPlayback();
                }
            };

            video.onclick = () => {
                if (video.paused && !isReversing) {
                    video.play();
                } else {
                    stopPlayback();
                }
            };

            // When video reaches the end, start reversing
            video.onended = () => {
                startReversePlayback();
            };

            video.onplay = () => {
                playIcon.classList.add('tw-hidden');
                pauseIcon.classList.remove('tw-hidden');
            };

            video.onpause = () => {
                if (!isReversing) {
                    playIcon.classList.remove('tw-hidden');
                    pauseIcon.classList.add('tw-hidden');
                }
            };

            video.ontimeupdate = () => { if (!isScrubbing && !isReversing) updateUI(); };

            video.onerror = () => {
                errorMsg.classList.remove('tw-hidden');
            };

            container.addEventListener('mousedown', startScrubbing);
            container.addEventListener('touchstart', startScrubbing, { passive: false });
            window.addEventListener('mousemove', (e) => { if (isScrubbing) scrub(e); });
            window.addEventListener('touchmove', (e) => { if (isScrubbing) scrub(e); }, { passive: false });
            window.addEventListener('mouseup', stopScrubbing);
            window.addEventListener('touchend', stopScrubbing);

            video.onloadedmetadata = updateUI;
            if (video.readyState >= 1) {
                updateUI();
            } else {
                video.load();
            }
        })();
</script>
